name: main

on:
  workflow_dispatch:

jobs:
  ncdu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-11-arm]

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        release: ${{ matrix.os == 'windows-11-arm' }}
        msystem: CLANGARM64

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
name: main

on:
  workflow_dispatch:

jobs:
  main:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-11-arm]

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      id: msys2
      uses: msys2/setup-msys2@v2
      with:
        release: ${{ matrix.os == 'windows-11-arm' }}
        msystem: CLANGARM64

    - name: hacky
      run: |
        New-Item -ItemType Junction -Path "C:\msys64" -Target "${{ steps.msys2.outputs.msys2-location }}"
  
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
